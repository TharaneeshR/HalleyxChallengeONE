server.port=8080
spring.application.name=workflow-engine

# MySQL DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/workflow_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Kutty@57
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Disable Liquibase
spring.liquibase.enabled=false

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
spring.jackson.deserialization.fail-on-unknown-properties=false

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Rule engine loop guard
app.rule-engine.max-loop-iterations=10

# Async thread pool
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100

# Logging
logging.level.com.halleyx=INFO
logging.level.org.hibernate.SQL=WARN